<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Balta Media · Conocimiento en acción</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fuentes -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="https://media.baltaanay.org/web/image/885-f3d79ca9/xhbalta-aula.png">
    <link rel="icon" type="image/png" sizes="16x16" href="https://media.baltaanay.org/web/image/885-f3d79ca9/xhbalta-aula.png">
    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="/styles.css">
    
    <!-- ESTILOS BASE - SIN LÍMITES ARTIFICIALES -->
    <style id="sidebar-base-styles">
        /* Reset */
        * {
            box-sizing: border-box;
        }
        
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            overflow-x: hidden;
        }
        
        body {
            min-height: 100vh;
            transition: margin-left 0.3s ease;
            background: #050505;
        }
        
        /* HEADER - OCUPA TODO EL ESPACIO DISPONIBLE */
        #main-header {
            position: sticky;
            top: 0;
            width: 100% !important;
            left: 0 !important;
            transition: left 0.3s ease, width 0.3s ease !important;
            z-index: 50;
            background: rgba(5,5,5,0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        #main-header > div {
            width: 100%;
            padding: 0.75rem 1rem;
        }
        
        /* BARRA DE CATEGORÍAS - OCUPA TODO EL ESPACIO DISPONIBLE */
        #category-filters {
            position: sticky;
            top: 0;
            width: 100% !important;
            left: 0 !important;
            transition: left 0.3s ease, width 0.3s ease !important;
            z-index: 40;
            background: rgba(5,5,5,0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        #category-filters > div {
            width: 100%;
            padding: 0.5rem 1rem;
        }
        
        /* CONTENEDOR PRINCIPAL - SIN LÍMITES, 100% DEL ESPACIO DISPONIBLE */
        #content {
            width: 100% !important;
            padding: 1rem 1rem !important;
            margin-left: 0 !important;
            transition: margin-left 0.3s ease;
            min-height: 100vh;
        }
        
        /* REPRODUCTOR */
        .player-universal {
            transition: left 0.3s ease, width 0.3s ease !important;
        }
        
        /* ESTILOS SIDEBAR */
        .sidebar-desktop {
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            background: #0F0F0F;
            color: #fff;
            z-index: 900;
            transition: width 0.3s ease;
            overflow-x: hidden;
            overflow-y: auto;
            box-shadow: 2px 0 5px rgba(0,0,0,0.5);
            scrollbar-width: none;
        }
        .sidebar-desktop::-webkit-scrollbar { display: none; }
        .sidebar-desktop.collapsed { width: 70px; }
        .sidebar-desktop.expanded { width: 15%; min-width: 180px; }
        
        @media (max-width: 768px) {
            .sidebar-desktop { display: none !important; }
        }

        .sidebar-toggle {
            display: flex;
            justify-content: flex-end;
            padding: 16px 12px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }
        .sidebar-toggle svg { width: 24px; height: 24px; fill: white; transition: transform 0.2s; }
        .sidebar-desktop.expanded .sidebar-toggle svg { transform: rotate(180deg); }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 0 8px;
            margin-bottom: 30px;
        }
        .sidebar-nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
            text-decoration: none;
            padding: 10px;
            border-radius: 8px;
            white-space: nowrap;
            transition: background 0.2s;
        }
        .sidebar-nav-item:hover { background: rgba(255,255,255,0.1); }
        .sidebar-nav-item.active { background: rgba(255,255,255,0.2); }
        .sidebar-nav-item img { width: 24px; height: 24px; filter: brightness(1.2); flex-shrink: 0; }
        .sidebar-nav-item span { font-size: 14px; font-weight: 500; }
        .sidebar-desktop.collapsed .sidebar-nav-item span { display: none; }

        .sidebar-desktop.collapsed .sidebar-rec-section { display: none; }
        .sidebar-rec-section {
            padding: 0 8px;
            margin-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 16px;
        }
        .sidebar-rec-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .sidebar-rec-header a {
            color: white;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.9;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .sidebar-rec-header svg { width: 16px; height: 16px; fill: white; }
        .sidebar-rec-list { display: flex; flex-direction: column; gap: 12px; }
        .sidebar-rec-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
        }
        .sidebar-rec-item-info { flex: 1; min-width: 0; }
        .sidebar-rec-item-title { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .sidebar-rec-item-author { font-size: 11px; opacity: 0.7; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .sidebar-rec-play-btn {
            background: none; border: none; color: white; cursor: pointer; padding: 4px 8px; border-radius: 4px;
            display: flex; align-items: center; justify-content: center; transition: background 0.2s;
        }
        .sidebar-rec-play-btn:hover { background: rgba(255,255,255,0.2); }
        .sidebar-rec-play-btn svg { width: 18px; height: 18px; fill: white; }
    </style>
</head>
<body class="bg-[#050505] text-white font-[Plus_Jakarta_Sans]">

    </div>

<main id="content">

</main>

<!-- Script de la barra lateral -->
<script>
(function() {
    const SIDEBAR_CONFIG = {
        BREAKPOINT: 768,
        WIDTH_EXPANDED: '15%',
        WIDTH_COLLAPSED: '70px',
        MIN_WIDTH_EXPANDED: '180px'
    };

    let sidebarInstance = {
        initialized: false,
        currentState: localStorage.getItem('sidebar_state') || 'collapsed',
        isMobile: window.innerWidth <= SIDEBAR_CONFIG.BREAKPOINT
    };

    // ==========================================================================
    // FUNCIÓN CRÍTICA - AJUSTE PERFECTO DEL LAYOUT
    // ==========================================================================
    function adjustLayout(expanded) {
        if (sidebarInstance.isMobile) return;
        
        // Calcular ancho exacto de la sidebar
        let sidebarWidth;
        if (expanded) {
            sidebarWidth = Math.max(
                parseFloat(SIDEBAR_CONFIG.MIN_WIDTH_EXPANDED),
                window.innerWidth * 0.15
            );
        } else {
            sidebarWidth = 70;
        }
        
        // Aplicar margin-left al body (esto empuja todo el contenido)
        document.body.style.marginLeft = sidebarWidth + 'px';
        document.body.classList.add('has-sidebar');
        
        // HEADER - Ocupa desde la sidebar hasta el borde derecho
        const header = document.getElementById('main-header');
        if (header) {
            header.style.left = sidebarWidth + 'px';
            header.style.width = `calc(100% - ${sidebarWidth}px)`;
        }
        
        // CATEGORÍAS - Ocupa desde la sidebar hasta el borde derecho
        const categories = document.getElementById('category-filters');
        if (categories) {
            categories.style.left = sidebarWidth + 'px';
            categories.style.width = `calc(100% - ${sidebarWidth}px)`;
        }
        
        // CONTENEDOR - Ocupa el 100% del espacio disponible desde la sidebar
        const content = document.getElementById('content');
        if (content) {
            content.style.marginLeft = '0'; // Ya lo controla el body
            content.style.width = '100%'; // 100% del espacio asignado por body
        }
        
        // REPRODUCTOR
        const player = document.querySelector('.player-universal');
        if (player) {
            player.style.left = sidebarWidth + 'px';
            player.style.width = `calc(100% - ${sidebarWidth}px)`;
        }
        
        localStorage.setItem('sidebar_state', expanded ? 'expanded' : 'collapsed');
        sidebarInstance.currentState = expanded ? 'expanded' : 'collapsed';
    }

    function resetLayout() {
        document.body.style.marginLeft = '';
        document.body.classList.remove('has-sidebar');
        
        const header = document.getElementById('main-header');
        if (header) { header.style.left = ''; header.style.width = ''; }
        
        const categories = document.getElementById('category-filters');
        if (categories) { categories.style.left = ''; categories.style.width = ''; }
        
        const content = document.getElementById('content');
        if (content) { content.style.marginLeft = ''; content.style.width = ''; }
        
        const player = document.querySelector('.player-universal');
        if (player) { player.style.left = ''; player.style.width = ''; }
    }

    function getRecommendations() {
        try { return window.RECOMENDADOS || []; } catch (e) { return []; }
    }

    function renderSidebar() {
        const sidebar = document.createElement('aside');
        sidebar.className = `sidebar-desktop ${sidebarInstance.currentState}`;
        sidebar.id = 'sidebarDesktop';

        const toggle = document.createElement('div');
        toggle.className = 'sidebar-toggle';
        toggle.id = 'sidebarDesktopToggle';
        toggle.innerHTML = '<svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>';

        const nav = document.createElement('div');
        nav.className = 'sidebar-nav';
        nav.innerHTML = `
            <a href="/" class="sidebar-nav-item" title="Home" data-link>
                <img src="https://media.baltaanay.org/web/image/798-1b947c8d/Home%20%282%29.webp" alt="Home" loading="lazy"><span>Home</span>
            </a>
            <a href="/buscar" class="sidebar-nav-item" title="Explorar" data-link>
                <img src="https://www.baltaanay.org/web/image/986-2bf9d2bb/Search%20%282%29.webp" alt="Explorar" loading="lazy"><span>Explorar</span>
            </a>
            <a href="/subir" class="sidebar-nav-item" title="Cargar" data-link>
                <img src="https://www.baltaanay.org/web/image/991-1c3c204a/subir.webp" alt="Cargar" loading="lazy"><span>Cargar</span>
            </a>
            <a href="https://www.baltaanay.org/solicitud" class="sidebar-nav-item" title="Solicitar">
                <img src="https://www.baltaanay.org/web/image/922-f3d79ca9/xhbalta-aula.png" alt="Solicitar" loading="lazy"><span>Solicitar</span>
            </a>
            <a href="/my/home" class="sidebar-nav-item" title="Usuario" data-link>
                <img src="https://nikichitonjesus3.odoo.com/web/image/453-f4d8c1eb/user.png" alt="Usuario" loading="lazy"><span>Portal</span>
            </a>
        `;

        const recSection = document.createElement('div');
        recSection.className = 'sidebar-rec-section';
        recSection.innerHTML = `
            <div class="sidebar-rec-header">
                <a href="/novedades" data-link>Recomendados<svg viewBox="0 0 24 24"><path d="M14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/></svg></a>
            </div>
            <div class="sidebar-rec-list" id="sidebarRecList"></div>
        `;

        sidebar.appendChild(toggle);
        sidebar.appendChild(nav);
        sidebar.appendChild(recSection);
        return sidebar;
    }

    function populateRecommendations() {
        const container = document.getElementById('sidebarRecList');
        if (!container) return;

        const episodes = getRecommendations();

        if (!episodes.length) {
            container.innerHTML = '<div style="color:#aaa; padding:8px;">No hay recomendados</div>';
            return;
        }

        container.innerHTML = '';
        episodes.forEach(ep => {
            const title = ep.title || 'Sin título';
            const author = ep.author || (ep.series?.titulo_serie) || 'Desconocido';
            const item = document.createElement('div');
            item.className = 'sidebar-rec-item';
            item.innerHTML = `
                <div class="sidebar-rec-item-info">
                    <div class="sidebar-rec-item-title">${title}</div>
                    <div class="sidebar-rec-item-author">${author}</div>
                </div>
                <button class="sidebar-rec-play-btn" data-episode='${JSON.stringify(ep).replace(/'/g, "&#39;")}'>
                    <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                </button>
            `;
            
            const btn = item.querySelector('.sidebar-rec-play-btn');
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const epData = JSON.parse(btn.dataset.episode);
                if (typeof window.playEpisodeExpanded === 'function') {
                    window.playEpisodeExpanded(
                        epData.mediaUrl || '',
                        epData.type || 'audio',
                        epData.coverUrl || '',
                        epData.series?.portada_serie || epData.coverUrl || '',
                        epData.title || '',
                        epData.detailUrl || '',
                        epData.author || (epData.series?.titulo_serie) || 'Roberto',
                        epData.next || [],
                        epData.description || '',
                        true
                    );
                }
            });
            container.appendChild(item);
        });
    }

    function setActiveNavItem() {
        const currentPath = window.location.pathname;
        document.querySelectorAll('.sidebar-nav-item').forEach(item => {
            const href = item.getAttribute('href');
            item.classList.toggle('active', 
                (href === currentPath) || 
                (href === '/' && currentPath === '/') ||
                (href === '/buscar' && currentPath === '/buscar')
            );
        });
    }

    function initSidebarToggle() {
        const sidebar = document.getElementById('sidebarDesktop');
        const toggle = document.getElementById('sidebarDesktopToggle');
        if (!sidebar || !toggle) return;

        const newToggle = toggle.cloneNode(true);
        toggle.parentNode.replaceChild(newToggle, toggle);
        
        newToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            e.preventDefault();
            
            const isCollapsed = sidebar.classList.contains('collapsed');
            if (isCollapsed) {
                sidebar.classList.remove('collapsed');
                sidebar.classList.add('expanded');
                adjustLayout(true);
            } else {
                sidebar.classList.add('collapsed');
                sidebar.classList.remove('expanded');
                adjustLayout(false);
            }
        });
    }

    function initSidebar() {
        sidebarInstance.isMobile = window.innerWidth <= SIDEBAR_CONFIG.BREAKPOINT;
        
        const oldSidebar = document.querySelector('.sidebar-desktop');
        if (oldSidebar) oldSidebar.remove();
        
        if (sidebarInstance.isMobile) {
            resetLayout();
            return;
        }
        
        const sidebar = renderSidebar();
        document.body.insertBefore(sidebar, document.body.firstChild);
        
        populateRecommendations();
        initSidebarToggle();
        setActiveNavItem();
        
        adjustLayout(sidebarInstance.currentState === 'expanded');
        
        sidebarInstance.initialized = true;
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initSidebar);
    } else {
        initSidebar();
    }

    window.addEventListener('resize', () => {
        const wasMobile = sidebarInstance.isMobile;
        const isMobileNow = window.innerWidth <= SIDEBAR_CONFIG.BREAKPOINT;
        
        if (wasMobile !== isMobileNow) {
            sidebarInstance.isMobile = isMobileNow;
            initSidebar();
        } else if (!sidebarInstance.isMobile) {
            adjustLayout(sidebarInstance.currentState === 'expanded');
        }
    });

    document.addEventListener('spa-navigation', setActiveNavItem);
    window.addEventListener('popstate', setActiveNavItem);

    window.sidebarAPI = {
        refresh: populateRecommendations,
        setActive: setActiveNavItem,
        toggle: () => {
            const sidebar = document.getElementById('sidebarDesktop');
            if (sidebar) {
                const isCollapsed = sidebar.classList.contains('collapsed');
                if (isCollapsed) {
                    sidebar.classList.remove('collapsed');
                    sidebar.classList.add('expanded');
                    adjustLayout(true);
                } else {
                    sidebar.classList.add('collapsed');
                    sidebar.classList.remove('expanded');
                    adjustLayout(false);
                }
            }
        }
    };
})();
</script>

<!-- Script principal (SIN importar player.js) -->
<script type="module" src="/main.js"></script>
</body>
